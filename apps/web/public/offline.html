<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#DC2626" />
    <title>OrderKaro — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #FFFFFF;
        color: #0A0A0A;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .icon-wrap {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #FEF2F2;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
      }
      .icon-wrap svg { width: 40px; height: 40px; color: #DC2626; }
      h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
      p { font-size: 15px; color: #737373; line-height: 1.6; max-width: 280px; margin-bottom: 32px; }
      button {
        background: #DC2626;
        color: #FFFFFF;
        border: none;
        border-radius: 12px;
        padding: 14px 28px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection. Check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </body>
</html>
